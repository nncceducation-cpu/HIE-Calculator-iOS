workflows:
  ios-capacitor:
    name: HIE Calculator iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # This name MUST exactly match the App Store Connect API key you add in
      # Codemagic  →  Teams / User settings  →  Integrations  →  App Store Connect.
      app_store_connect: AppStoreConnectKey
    environment:
      vars:
        BUNDLE_ID: "com.HIE-Calc"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html www/index.html
          cp aeeg-patterns.jpg www/aeeg-patterns.jpg 2>/dev/null || echo "aeeg-patterns.jpg not in repo yet; app will fall back to the remote figure."
      - name: Install npm dependencies
        script: npm install
      - name: Generate the iOS project
        script: |
          npx cap add ios || true
          npx cap sync ios
          # Capacitor forbids dashes in appId, but the App Store bundle id is
          # com.HIE-Calc — force it into the generated Xcode project.
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.HIE-Calc;/g' ios/App/App.xcodeproj/project.pbxproj
          # Use the real app icon (green brain/heart logo) instead of Capacitor's placeholder.
          rm -rf ios/App/App/Assets.xcassets/AppIcon.appiconset
          mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
          cp appicon-1024.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
          printf '%s' '{"images":[{"filename":"AppIcon-512@2x.png","idiom":"universal","platform":"ios","size":"1024x1024"}],"info":{"author":"xcode","version":1}}' > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json
      - name: Set version and build number
        script: |
          cd ios/App
          agvtool new-marketing-version 2.0
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Set up code signing
        script: |
          keychain initialize
          # No existing certificate private key is available on this machine, so
          # generate one and let fetch-signing-files create a fresh iOS
          # distribution certificate + provisioning profile from it.
          openssl genrsa -out /tmp/dist_cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build the signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-capacitor:
    name: HIE Calculator Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      android_signing:
        # This reference name must match the Android keystore you add in
        # Codemagic  →  Teams / User settings  →  Code signing identities  →  Android keystores.
        - hie_upload_keystore
      vars:
        node: 20
    scripts:
      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html www/index.html
          cp aeeg-patterns.jpg www/aeeg-patterns.jpg 2>/dev/null || echo "aeeg-patterns.jpg not in repo yet; app will fall back to the remote figure."
      - name: Install npm dependencies
        script: npm install
      - name: Generate the Android project
        script: |
          npx cap add android || true
          npx cap sync android
      - name: Set version code and name
        script: |
          cd android
          sed -i.bak "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" app/build.gradle
          sed -i.bak "s/versionName \"[^\"]*\"/versionName \"2.0\"/" app/build.gradle
      - name: Build the release AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
